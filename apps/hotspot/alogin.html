<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connected</title>
<style>
  body{margin:0;min-height:100vh;background:#0f172a;display:flex;align-items:center;
    justify-content:center;font-family:system-ui,sans-serif;color:#94a3b8;flex-direction:column;gap:16px}
  .spinner{width:32px;height:32px;border:3px solid #1e293b;border-top-color:#4ade80;
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:.875rem;margin:0}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Redirecting to dashboard…</p>
<script>
(function(){
  var params = location.search;
  fetch('/api/portal/hotspot-config')
    .then(function(r){return r.json();})
    .then(function(cfg){
      var base = (cfg.portalUrl || '').replace(/\/$/, '');
      if(!base) base = location.protocol + '//' + location.hostname.replace('hotspot.','wifi.');
      location.replace(base + '/s-dashboard' + params);
    })
    .catch(function(){
      var fallback = location.protocol + '//' + location.hostname.replace('hotspot.','wifi.');
      location.replace(fallback + '/s-dashboard' + params);
    });
})();
</script>
</body>
</html>
