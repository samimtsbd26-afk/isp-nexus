<html>
<head>
    <title>Logout - Skynity ISP</title>
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0;"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-stars"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <a href="login.html" class="logo" style="margin:0 auto;">
                <h1>SKYNITY</h1>
                <p>POWERED BY STARLINK</p>
            </a>
        </header>

        <div class="auth-box">
            <h2>Logged Out</h2>

            <div style="text-align: center; margin-bottom: 20px;">
                <div class="status-circle status-circle--out">
                    LOGGED OUT
                </div>
                <h3 class="status-headline-err">DISCONNECTED</h3>
                <p class="helper-muted">Thank you for using our service.</p>
            </div>

            <table class="status-table">
                <tr>
                    <th>ID Username</th>
                    <td>$(username)</td>
                </tr>
                <tr>
                    <th>◎ IP Address</th>
                    <td>$(ip)</td>
                </tr>
                <tr>
                    <th> Bytes Up</th>
                    <td>$(bytes-in-nice)</td>
                </tr>
                <tr>
                    <th> Bytes Down</th>
                    <td>$(bytes-out-nice)</td>
                </tr>
                <tr>
                    <th> Session Time</th>
                    <td>$(uptime)</td>
                </tr>
            </table>

            <a href="login.html" class="auth-btn auth-btn-primary" style="text-decoration:none; display:block; text-align:center;">LOGIN AGAIN</a>
        </div>

        <div class="copyright">
            © 2026 SKYNITY • Powered by STARLINK • All rights reserved.
        </div>
    </div>
</body>
</html>
